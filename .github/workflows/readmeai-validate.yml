name: ReadMeAI Sync Check

on:
  push:
    paths:
      - '.readmeAI'
      - 'AGENTS.md'
      - 'package.json'
      - 'pyproject.toml'
      - 'go.mod'
      - 'Cargo.toml'
  pull_request:
    paths:
      - '.readmeAI'
      - 'AGENTS.md'
      - 'package.json'

jobs:
  validate:
    name: Validate .readmeAI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check .readmeAI exists
        run: |
          if [ ! -f ".readmeAI" ]; then
            echo "::error::.readmeAI not found. Run: curl -sSL https://raw.githubusercontent.com/Oscarr36/ReadMeAI/main/setup.sh | bash"
            exit 1
          fi
          echo "✓ .readmeAI exists ($(wc -l < .readmeAI) lines)"

      - name: Check AGENTS.md exists
        run: |
          if [ ! -f "AGENTS.md" ]; then
            echo "::warning::AGENTS.md not found — run setup.sh to generate it for cross-tool compatibility"
          else
            echo "✓ AGENTS.md exists"
          fi

      - name: Check SESSION STATE is filled
        run: |
          if grep -q "SESSION STATE" .readmeAI; then
            # Check if active objective is still placeholder
            OBJECTIVE=$(awk '/### Active objective/{found=1;next} found && NF{print;exit}' .readmeAI | xargs)
            if [ "$OBJECTIVE" = "_One sentence: what are we building/fixing right now?_" ] || \
               [ "$OBJECTIVE" = "—" ] || [ -z "$OBJECTIVE" ]; then
              echo "::warning::SESSION STATE is blank. Tell your AI: 'Detect my stack, fill what you can.'"
            else
              echo "✓ SESSION STATE filled: $OBJECTIVE"
            fi
          fi

      - name: Check DOMAIN RULES are filled
        run: |
          if grep -A5 "## 🧠 DOMAIN RULES" .readmeAI | grep -qE "^- —$"; then
            echo "::notice::DOMAIN RULES are empty — highest-value section. Ask your AI: 'What rule in this codebase would cause a bug if I didn't know it?'"
          else
            echo "✓ DOMAIN RULES present"
          fi

      - name: Check QUICK REFERENCE is filled
        run: |
          # QUICK REFERENCE should have values, not just "—"
          QR_BLANKS=$(awk '/## ⚡ QUICK REFERENCE/,/^---/{print}' .readmeAI | grep -c "| — |" || true)
          if [ "$QR_BLANKS" -gt 3 ]; then
            echo "::notice::QUICK REFERENCE is mostly empty — AI won't be able to hot-restart efficiently"
          else
            echo "✓ QUICK REFERENCE populated"
          fi

      - name: Check AI integrations
        run: |
          MISSING=()
          [ ! -f "AGENTS.md" ]                               && MISSING+=("AGENTS.md (universal)")
          [ ! -f ".claude/CLAUDE.md" ]                       && MISSING+=("Claude Code (.claude/CLAUDE.md)")
          [ ! -f ".cursor/rules/readmeai-context.mdc" ] && \
            [ ! -f ".cursorrules" ]                          && MISSING+=("Cursor (no .mdc or .cursorrules)")
          [ ! -f ".windsurfrules" ]                          && MISSING+=("Windsurf (.windsurfrules)")
          [ ! -f "GEMINI.md" ]                               && MISSING+=("Gemini CLI (GEMINI.md)")

          if [ ${#MISSING[@]} -gt 0 ]; then
            for tool in "${MISSING[@]}"; do
              echo "::notice::$tool not wired — run: bash setup.sh --all"
            done
          else
            echo "✓ All key AI integrations present"
          fi

      - name: Check stack consistency
        if: hashFiles('package.json') != ''
        run: |
          if ! grep -q "TECH STACK" .readmeAI; then
            echo "::warning::package.json found but no TECH STACK in .readmeAI — run: bash setup.sh --detect"
          else
            echo "✓ TECH STACK section present"
          fi

      - name: File size check
        run: |
          LINES=$(wc -l < .readmeAI)
          if [ "$LINES" -gt 800 ]; then
            echo "::warning::.readmeAI is $LINES lines — consider removing unfilled optional sections to reduce token cost"
          else
            echo "✓ File size OK ($LINES lines)"
          fi

      - name: Summary
        run: echo "ReadMeAI v3.2 validation complete. Run 'bash setup.sh --validate' locally for full check."
